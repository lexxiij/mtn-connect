<!-- Full-page centered layout -->
<div class="login-page">
  <div class="login-card">

    <!-- Logo / Branding -->
    <div class="login-brand">
      <h1>MTN, Inc.</h1>
      <p>Admin Portal</p>
    </div>

    <h2>Sign In</h2>

    <form #form="ngForm" (ngSubmit)="submit(form)">

      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          [(ngModel)]="username"
          required
          #usernameCtrl="ngModel"
          autocomplete="username"
          placeholder="Enter your username"
        />
        @if ((usernameCtrl.touched || submitted) && usernameCtrl.errors?.['required']) {
          <small class="field-error">Username is required</small>
        }
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          required
          #passwordCtrl="ngModel"
          autocomplete="current-password"
          placeholder="Enter your password"
        />
        @if ((passwordCtrl.touched || submitted) && passwordCtrl.errors?.['required']) {
          <small class="field-error">Password is required</small>
        }
      </div>

      @if (errorMsg) {
        <div class="error-banner">{{ errorMsg }}</div>
      }

      <button type="submit" class="btn-login" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>

    </form>

    <a routerLink="/" class="back-link">← Back to Home</a>

  </div>
</div>
